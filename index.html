<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Scout Units Near You</title>
  <meta name="description" content="Search or click the map to find nearby scout units by distance." />

  <!-- Leaflet 1.9.4 (cdnjs) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css" crossorigin="" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="view-list">
  <header class="site-header">
    <div class="site-header-inner">
      <div class="title-block">
        <h1 id="site-title">Find Scout Units Near You</h1>
        <span class="badge" id="site-badge">Sample data</span>
      </div>

      <form id="search-form" class="search" role="search" autocomplete="off">
        <label class="sr-only" for="search-input">Search</label>
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
          <input
            id="search-input"
            type="search"
            name="q"
            placeholder="Search a country, NSO, or unit (e.g. Korea, Japan, Fiji)"
            aria-describedby="search-hint" />
          <button type="submit" class="search-go">Search</button>
        </div>
        <p id="search-hint" class="search-hint">Or click the map to set your reference point.</p>
      </form>

      <div class="header-controls">
        <div class="view-toggle" role="group" aria-label="List / Map view">
          <button type="button" class="view-toggle-btn" data-view="list" aria-pressed="true">List</button>
          <button type="button" class="view-toggle-btn" data-view="map" aria-pressed="false">Map</button>
        </div>
        <div class="editor-bar">
          <span id="save-status" class="save-status"></span>
          <button type="button" id="add-btn-home" class="ed-btn ed-only">+ Add unit</button>
          <button type="button" id="save-btn" class="ed-btn ed-only primary">Save</button>
          <button type="button" id="edit-toggle" class="gear-btn" aria-pressed="false" title="Admin tools" aria-label="Admin tools">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" aria-hidden="true">
              <circle cx="12" cy="12" r="3.2"></circle>
              <path d="M12 2.5v3M12 18.5v3M2.5 12h3M18.5 12h3M5.2 5.2l2.1 2.1M16.7 16.7l2.1 2.1M18.8 5.2l-2.1 2.1M7.3 16.7l-2.1 2.1"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="results" aria-label="Search results">
      <div class="results-head">
        <p id="status" class="results-status" role="status" aria-live="polite"></p>
        <button id="reset-btn" type="button" class="reset-btn" hidden>Show all</button>
      </div>

      <ol id="result-list" class="result-list"></ol>

      <div id="empty-state" class="empty-state" hidden>
        <p class="empty-title">No results.</p>
        <p class="empty-sub">Try another keyword, or click the map to set a location.</p>
        <button type="button" class="reset-btn" data-reset>Show all</button>
      </div>
    </aside>

    <div id="map" class="map" role="application" aria-label="Map"></div>
  </main>

  <footer class="site-footer">
    <a href="manage.html" id="footer-admin">Admin</a>
    <span aria-hidden="true">·</span>
    <button type="button" id="download-json" class="link-btn">Download data (JSON)</button>
    <span aria-hidden="true">·</span>
    <button type="button" id="download-js" class="link-btn">Download data.js</button>
    <span class="footer-note" aria-hidden="true">·</span>
    <span class="footer-note" id="footer-note">Running on sample data</span>
  </footer>

  <!-- Leaflet 1.9.4 (cdnjs) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js" crossorigin=""></script>
  <!-- data then logic (classic scripts share global scope) -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="version-watch.js"></script>
</body>
</html>
