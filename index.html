<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scout Finder — find Scout units, offices &amp; heritage near you</title>
  <meta name="description" content="Search or tap the map to find nearby Scout units, national offices and heritage sites, sorted by distance." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,500;12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div style="position:fixed;inset:0;font-family:'Hanken Grotesk',sans-serif;color:#1E1730;background:#e9ece5;overflow:hidden;">

    <div style="position:absolute;inset:0;"><div id="map" style="position:absolute;inset:0;"></div></div>

    <!-- REGION LEGEND (top-right) -->
    <div class="sf-legend" style="position:absolute;top:18px;right:18px;z-index:640;background:#fff;border:1px solid #ece6db;border-radius:15px;padding:13px 15px;box-shadow:0 10px 30px rgba(30,18,55,.13);width:188px;">
      <div style="font:700 10.5px 'Hanken Grotesk';text-transform:uppercase;letter-spacing:.06em;color:#9a93a6;margin-bottom:9px;">Scout Regions</div>
      <div id="legend-rows"></div>
      <div style="border-top:1px solid #f0ebe2;margin-top:9px;padding-top:9px;display:flex;flex-direction:column;gap:6px;">
        <div style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#6b6577;"><span style="width:13px;height:13px;border-radius:50%;background:#9a93a6;flex:none;"></span>Unit</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#6b6577;"><span style="width:13px;height:13px;border-radius:4px;background:#9a93a6;flex:none;"></span>Office</div>
        <div style="display:flex;align-items:center;gap:8px;font-size:11.5px;color:#6b6577;"><span style="width:13px;height:13px;border-radius:50%;background:#9a93a6;flex:none;position:relative;"><span style="position:absolute;top:-4px;right:-4px;width:9px;height:9px;background:#C2872E;border:1.5px solid #fff;border-radius:50%;"></span></span>Heritage</div>
      </div>
    </div>

    <!-- RESULTS PANEL (left) -->
    <div id="panel" class="sf-panel" style="position:absolute;left:18px;top:18px;bottom:104px;width:360px;z-index:600;background:rgba(255,255,255,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(236,230,219,.9);border-radius:18px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 18px 50px rgba(30,18,55,.16);transition:transform .32s cubic-bezier(.4,0,.2,1),opacity .2s;">
      <div style="padding:16px 16px 13px;border-bottom:1px solid #f0ebe2;flex:none;">
        <div style="display:flex;align-items:center;gap:11px;margin-bottom:13px;">
          <div style="width:36px;height:36px;border-radius:10px;background:linear-gradient(150deg,#6336B5,#3D1D6E);display:flex;align-items:center;justify-content:center;color:#fff;font:700 18px 'Bricolage Grotesque';flex:none;">S</div>
          <div style="flex:1;min-width:0;">
            <div style="font:700 15px 'Bricolage Grotesque';line-height:1.1;letter-spacing:-.01em;">Scout Finder</div>
            <div style="font-size:11px;color:#8a8496;margin-top:2px;">Compiled from publicly available sources</div>
          </div>
          <button id="panel-collapse" title="Collapse panel" style="border:none;background:#f1ece4;width:30px;height:30px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b6577;flex:none;">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"></path></svg>
          </button>
        </div>
        <div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:11px;">
          <div>
            <div style="font:700 13.5px 'Hanken Grotesk';color:#1E1730;"><span id="count">0</span> <span style="color:#9a93a6;font-weight:500;">of <span id="total">0</span> places</span></div>
            <div id="anchor-line" style="font-size:11.5px;color:#8a8496;margin-top:2px;">Showing all places · search or tap the map</div>
          </div>
          <button id="reset" style="border:none;background:transparent;color:#6336B5;font:600 12px 'Hanken Grotesk';cursor:pointer;padding:0;">Show all</button>
        </div>
        <div id="kind-chips" style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;"></div>
        <div id="region-chips" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
      </div>

      <div id="unit-list" class="sf-scroll" style="flex:1;overflow-y:auto;padding:12px;"></div>

      <div style="flex:none;padding:11px 16px;border-top:1px solid #f0ebe2;display:flex;align-items:center;gap:16px;background:rgba(251,250,247,.7);">
        <button id="download" style="border:none;background:transparent;color:#6b6577;font:600 12px 'Hanken Grotesk';cursor:pointer;padding:0;display:inline-flex;align-items:center;gap:5px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12m0 0 4-4m-4 4-4-4"></path><path d="M5 21h14"></path></svg>Download JSON
        </button>
        <a href="/admin" style="color:#6b6577;font:600 12px 'Hanken Grotesk';text-decoration:none;display:inline-flex;align-items:center;gap:5px;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15a3 3 0 1 0 0-6 3 3 0 0 0 0 6Z"></path><path d="M19.4 15a1.6 1.6 0 0 0 .3 1.8l.1.1a2 2 0 1 1-2.8 2.8l-.1-.1a1.6 1.6 0 0 0-2.7 1.1V21a2 2 0 0 1-4 0v-.1A1.6 1.6 0 0 0 7 19.4l-.1.1a2 2 0 1 1-2.8-2.8l.1-.1A1.6 1.6 0 0 0 4.6 14H4.5a2 2 0 0 1 0-4h.1A1.6 1.6 0 0 0 6 7.3l-.1-.1a2 2 0 1 1 2.8-2.8l.1.1A1.6 1.6 0 0 0 10 4.6V4.5a2 2 0 0 1 4 0v.1A1.6 1.6 0 0 0 17 6l.1-.1a2 2 0 1 1 2.8 2.8l-.1.1a1.6 1.6 0 0 0 1.1 2.7h.1a2 2 0 0 1 0 4h-.1a1.6 1.6 0 0 0-1.5 1Z"></path></svg>Admin
        </a>
      </div>
    </div>

    <!-- COLLAPSED PANEL REOPEN -->
    <div id="panel-reopen" style="display:none;position:absolute;left:18px;top:18px;z-index:620;align-items:center;gap:9px;background:#fff;border:1px solid #ece6db;border-radius:14px;padding:11px 15px;box-shadow:0 10px 30px rgba(30,18,55,.14);cursor:pointer;">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="#6336B5" stroke-width="2.2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h16"></path></svg>
      <span style="font:700 12.5px 'Hanken Grotesk';color:#1E1730;"><span id="reopen-count">0</span> places</span>
    </div>

    <!-- BOTTOM SEARCH -->
    <div id="searchbar" class="sf-search" style="position:absolute;left:398px;right:18px;bottom:18px;z-index:700;display:flex;justify-content:center;pointer-events:none;transition:left .32s cubic-bezier(.4,0,.2,1);">
      <div style="pointer-events:auto;width:100%;max-width:640px;background:#fff;border:1px solid #ece6db;border-radius:18px;box-shadow:0 14px 40px rgba(30,18,55,.18);overflow:hidden;">
        <div style="display:flex;align-items:center;gap:8px;padding:9px 10px 9px 13px;flex-wrap:wrap;border-bottom:1px solid #f3eee5;">
          <button id="near-btn" style="display:inline-flex;align-items:center;gap:6px;border:1px solid #e7e1d8;padding:8px 13px;border-radius:11px;font:600 12.5px 'Hanken Grotesk';cursor:pointer;background:#fff;color:#5b5366;transition:all .15s;">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.1" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-5.2-7-11a7 7 0 0 1 14 0c0 5.8-7 11-7 11Z"></path><circle cx="12" cy="10" r="2.4"></circle></svg><span id="near-label">Near me</span>
          </button>
          <span style="font:600 12px 'Hanken Grotesk';color:#b3adbd;">·</span>
          <span style="font:600 12px 'Hanken Grotesk';color:#9a93a6;">Nearest</span>
          <button class="q-near" data-kind="unit" style="border:1px solid #e7e1d8;padding:6px 11px;border-radius:999px;font:600 12px 'Hanken Grotesk';cursor:pointer;background:#fff;color:#5b5366;transition:all .15s;">Unit</button>
          <button class="q-near" data-kind="office" style="border:1px solid #e7e1d8;padding:6px 11px;border-radius:999px;font:600 12px 'Hanken Grotesk';cursor:pointer;background:#fff;color:#5b5366;transition:all .15s;">Office</button>
          <button class="q-near" data-kind="heritage" style="border:1px solid #e7e1d8;padding:6px 11px;border-radius:999px;font:600 12px 'Hanken Grotesk';cursor:pointer;background:#fff;color:#5b5366;transition:all .15s;">Heritage</button>
        </div>
        <div style="display:flex;align-items:center;gap:11px;padding:13px 14px;">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="#9a93a6" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"></circle><path d="m20 20-3.2-3.2"></path></svg>
          <input id="search-input" placeholder="Search a country, region, NSO, place or unit — or click the map to set your point" style="flex:1;border:none;outline:none;font:500 14.5px 'Hanken Grotesk';color:#1E1730;background:transparent;" />
          <button id="search-go" style="border:none;background:#6336B5;color:#fff;font:600 13px 'Hanken Grotesk';padding:9px 16px;border-radius:11px;cursor:pointer;flex:none;">Search</button>
        </div>
      </div>
    </div>

    <!-- COMMENTS DRAWER -->
    <div id="drawer" class="sf-drawer" style="display:none;position:absolute;top:0;right:0;bottom:0;width:392px;max-width:92vw;z-index:900;background:#fbfaf7;border-left:1px solid #ece6db;box-shadow:-18px 0 50px rgba(30,18,55,.16);flex-direction:column;">
      <div style="flex:none;padding:17px 18px;border-bottom:1px solid #f0ebe2;display:flex;align-items:flex-start;justify-content:space-between;gap:10px;">
        <div>
          <div style="font:700 10.5px 'Hanken Grotesk';text-transform:uppercase;letter-spacing:.06em;color:#9a93a6;margin-bottom:3px;">Comments</div>
          <div id="drawer-title" style="font:700 16px 'Bricolage Grotesque';letter-spacing:-.01em;"></div>
        </div>
        <button id="drawer-close" style="border:none;background:#f1ece4;width:30px;height:30px;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b6577;flex:none;">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="m6 6 12 12M18 6 6 18"></path></svg>
        </button>
      </div>
      <div id="thread" class="sf-scroll" style="flex:1;overflow-y:auto;padding:14px 16px;"></div>
      <div style="flex:none;padding:14px 16px;border-top:1px solid #f0ebe2;background:#fff;">
        <div id="reply-banner" style="display:none;align-items:center;justify-content:space-between;font-size:11.5px;color:#6b6577;background:#f3eefb;border-radius:9px;padding:6px 10px;margin-bottom:9px;">Replying to <span id="reply-name"></span><button id="reply-cancel" style="border:none;background:transparent;color:#6336B5;font:600 11.5px 'Hanken Grotesk';cursor:pointer;">Cancel</button></div>
        <input id="nick" placeholder="Your nickname" style="width:100%;border:1px solid #ece6db;border-radius:11px;padding:10px 12px;font:500 13px 'Hanken Grotesk';outline:none;margin-bottom:8px;background:#fbfaf7;" />
        <textarea id="draft" placeholder="Share a tip, a question, or your experience…" style="width:100%;border:1px solid #ece6db;border-radius:11px;padding:10px 12px;font:500 13px 'Hanken Grotesk';outline:none;resize:vertical;min-height:64px;background:#fbfaf7;"></textarea>
        <label style="display:flex;align-items:flex-start;gap:8px;margin:9px 0 11px;cursor:pointer;">
          <input id="consent" type="checkbox" style="margin-top:2px;width:15px;height:15px;accent-color:#6336B5;flex:none;" />
          <span style="font-size:11px;color:#8a8496;line-height:1.4;">I consent to my nickname and a masked IP being stored with this comment (GDPR).</span>
        </label>
        <button id="post-btn" style="width:100%;border:none;border-radius:11px;padding:11px;font:600 13px 'Hanken Grotesk';cursor:pointer;background:#ece6db;color:#a39bb0;">Post comment</button>
      </div>
    </div>

  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="version-watch.js"></script>
</body>
</html>
