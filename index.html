<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Scout Units Near You · 스카우트 단위대 찾기</title>
  <meta name="description" content="Search a region or click the map to find nearby scout units by distance." />

  <!-- Leaflet 1.9.4 (cdnjs) -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"
    crossorigin="" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body class="view-list">
  <header class="site-header">
    <div class="site-header-inner">
      <div class="title-block">
        <h1 id="site-title">Find Scout Units Near You</h1>
        <span class="badge" id="site-badge">Sample data</span>
        <div class="lang-toggle" role="group" aria-label="Language">
          <button type="button" class="lang-btn" data-lang="en" aria-pressed="true">EN</button>
          <button type="button" class="lang-btn" data-lang="ko" aria-pressed="false">한국어</button>
        </div>
      </div>

      <form id="search-form" class="search" role="search" autocomplete="off">
        <label class="sr-only" for="search-input">지역 검색</label>
        <div class="search-field">
          <svg class="search-icon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
            <circle cx="11" cy="11" r="7"></circle>
            <line x1="16.5" y1="16.5" x2="21" y2="21"></line>
          </svg>
          <input
            id="search-input"
            type="search"
            name="q"
            placeholder="지역을 검색하세요 (예: 수원, 강남구, 영통동)"
            aria-describedby="search-hint" />
          <button type="submit" class="search-go">검색</button>
        </div>
        <p id="search-hint" class="search-hint">또는 지도를 클릭해 기준 위치를 정하세요.</p>
      </form>

      <div class="view-toggle" role="group" aria-label="목록 / 지도 보기 전환">
        <button type="button" class="view-toggle-btn" data-view="list" aria-pressed="true">목록</button>
        <button type="button" class="view-toggle-btn" data-view="map" aria-pressed="false">지도</button>
      </div>
    </div>
  </header>

  <main class="layout">
    <aside class="results" aria-label="지역대 검색 결과">
      <div class="results-head">
        <p id="status" class="results-status" role="status" aria-live="polite"></p>
        <button id="reset-btn" type="button" class="reset-btn" hidden>전체 보기</button>
      </div>

      <ol id="result-list" class="result-list"></ol>

      <div id="empty-state" class="empty-state" hidden>
        <p class="empty-title">검색 결과가 없습니다.</p>
        <p class="empty-sub">다른 지역명으로 검색하거나, 지도를 클릭해 위치를 정해보세요.</p>
        <button type="button" class="reset-btn" data-reset>전체 보기</button>
      </div>
    </aside>

    <div id="map" class="map" role="application" aria-label="지역대 지도"></div>
  </main>

  <footer class="site-footer">
    <a href="manage.html" id="footer-admin">Admin</a>
    <span aria-hidden="true">·</span>
    <button type="button" id="download-json" class="link-btn">Download data (JSON)</button>
    <span aria-hidden="true">·</span>
    <button type="button" id="download-js" class="link-btn">Download data.js</button>
    <span class="footer-note" aria-hidden="true">·</span>
    <span class="footer-note" id="footer-note">Running on sample data</span>
  </footer>

  <!-- Leaflet 1.9.4 (cdnjs) -->
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"
    crossorigin=""></script>

  <!-- 데이터 → 로직 순서 (둘 다 classic script, 전역 공유) -->
  <script src="data.js"></script>
  <script src="app.js"></script>
  <script src="version-watch.js"></script>
</body>
</html>
