name: Deploy jimmypark.net On Push

# Push to main → Cloudflare Pages production (jimmypark.net) automatically.
#
# jimmypark.net is hosted on Cloudflare Pages (project: `jimmyport`) and the
# project is NOT git-integrated, so a bare `git push` never updates production.
# This workflow closes that gap by calling `wrangler pages deploy` whenever a
# meaningful change lands on `main`.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   CLOUDFLARE_API_TOKEN    Pages:Edit + Account.Pages permissions
#   CLOUDFLARE_ACCOUNT_ID   the Cloudflare account that owns the `jimmyport`
#                           Pages project (account id is visible on the dash)
#
# Skip on a per-commit basis by including `[skip deploy]` in the commit message.

on:
  push:
    branches: [main]
    paths-ignore:
      # Docs-only changes don't need a redeploy — the public site doesn't serve
      # these from its production tree.
      - '**/*.md'
      - '.github/**'
  workflow_dispatch:

permissions:
  contents: read
  deployments: write

concurrency:
  # Only the latest push needs to land; cancel in-flight deploys when a newer
  # commit arrives so production tip = HEAD.
  group: deploy-jimmypark-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip deploy]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 1

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Wrangler
        run: npm install -g wrangler@4.86.0

      - name: Check Cloudflare Secrets
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ] || [ -z "${CLOUDFLARE_ACCOUNT_ID}" ]; then
            echo "::error::Missing CLOUDFLARE_API_TOKEN or CLOUDFLARE_ACCOUNT_ID repo secret."
            echo "Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy to Cloudflare Pages (jimmyport)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          COMMIT_SHA="$(git rev-parse HEAD)"
          COMMIT_MESSAGE="$(git log -1 --pretty=%s)"
          echo "Deploying $COMMIT_SHA — $COMMIT_MESSAGE"
          wrangler pages deploy . \
            --project-name jimmyport \
            --branch main \
            --commit-hash "${COMMIT_SHA}" \
            --commit-message "${COMMIT_MESSAGE}"

      - name: Verify production
        run: |
          set -e
          sleep 6
          SITE_VER=$(curl -sS -m 10 "https://jimmypark.net/VERSION?_=$(date +%s)" -H "Cache-Control: no-cache" | tr -d '[:space:]')
          ADMIN_VER=$(curl -sS -m 10 "https://jimmypark.net/ADMIN_VERSION?_=$(date +%s)" -H "Cache-Control: no-cache" | tr -d '[:space:]')
          echo "jimmypark.net /VERSION        → ${SITE_VER}"
          echo "jimmypark.net /ADMIN_VERSION  → ${ADMIN_VER}"
          if [ -z "${SITE_VER}" ] || [ -z "${ADMIN_VER}" ]; then
            echo "::warning::Could not read /VERSION endpoints — Cloudflare cache may still be propagating."
          fi
