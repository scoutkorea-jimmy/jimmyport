<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>디데이 프로젝트 — 제16회 한국잼버리</title>
  <link rel="icon" type="image/png" href="/jamboree/assets/logo.png" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="제16회 한국잼버리" />
  <meta property="og:title" content="제16회 한국잼버리 · 디데이 프로젝트" />
  <meta property="og:description" content="세계 스카우트와 함께하는 한국잼버리 카운트다운 · 2026.8.5 개막" />
  <meta property="og:image" content="https://scoutingapp.net/jamboree/assets/og-dcount.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://scoutingapp.net/krjam-dcount" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="제16회 한국잼버리 디데이 프로젝트" />
  <meta name="twitter:description" content="세계 스카우트와 함께하는 카운트다운" />
  <meta name="twitter:image" content="https://scoutingapp.net/jamboree/assets/og-dcount.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── 카드용 브랜드 폰트 (자체호스트, krjam-cardnews 와 동일) ── */
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-300.woff2') format('woff2'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-700.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-300.woff') format('woff'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-500.woff') format('woff'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-700.woff') format('woff'); font-weight:700; font-display:swap; }

    /* ── 페이지 크롬: krjam-planning 그린 톤 토큰 ── */
    :root{
      --bg:#F3F4F1; --surface:#FFFFFF; --surface-2:#FAFBF9; --surface-3:#F5F7F3;
      --ink:#1B211D; --ink-2:#3E453F; --muted:#697066; --faint:#AAB0A8;
      --line:#E4E7E1; --line-2:#EDEFEA;
      --accent:#2F5D4A; --accent-ink:#234636; --accent-soft:#E8F0EB;
      --st-draft:#C8821C; --st-ready:#2F8F6B; --danger:#B5503C;
      --r-1:8px; --r-2:12px; --r-3:16px; --pill:999px;
      --sh-1:0 1px 2px rgba(22,32,26,.04), 0 1px 3px rgba(22,32,26,.05);
      --sh-2:0 6px 20px rgba(22,32,26,.10);
      --sh-3:0 22px 60px rgba(22,32,26,.24);
      --ease:.16s cubic-bezier(.4,0,.2,1);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{ background:var(--bg); color:var(--ink); font-family:'Hanken Grotesk','Apple SD Gothic Neo',sans-serif; }
    /* 카드 내부는 브랜드 폰트(Card 가 var(--cc-main) 사용), 제목용은 .hi(Aggravo) */
    .hi{ font-family:'Aggravo','Cafe24ProSlim',sans-serif; }
    img{ -webkit-user-drag:none; user-select:none; }
    .syncbar{ border-bottom:1px solid var(--line); padding:11px 0; display:flex; gap:12px; align-items:center; }
    .orgtag{ font-weight:700; color:var(--accent); font-size:13px; letter-spacing:-.01em; }
    .syncbar .st{ font-size:12px; color:var(--muted); }
    #__boot{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font:14px/1.4 'Hanken Grotesk',sans-serif; }

    /* ── D-count 컴포넌트 ── */
    /* 모바일 최적화 고정폭 — PC에서는 좌우 여백만 커짐(반응형 리플로우 없음) */
    .dc-wrap{ max-width:480px; margin:0 auto; padding:0 18px 80px; overflow-x:hidden; }
    .dc-wrap *{ min-width:0; }   /* grid/flex min-width:auto 오버플로우 차단 */
    .dc-wrap img{ max-width:100%; }
    .dc-nav{ display:flex; gap:6px; background:var(--surface-3); border:1px solid var(--line); border-radius:var(--pill); padding:4px; margin:18px 0 4px; width:max-content; }
    .dc-nav button{ font:inherit; font-size:13px; font-weight:600; padding:8px 18px; border:none; background:none; color:var(--muted); border-radius:var(--pill); cursor:pointer; }
    .dc-nav button.on{ background:var(--accent); color:#fff; box-shadow:var(--sh-1); }
    .dc-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-3); padding:18px; box-shadow:var(--sh-1); overflow:hidden; }
    .dc-cal{ display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:10px; }
    .dc-slot{ border:1px solid var(--line); border-radius:var(--r-2); padding:12px 8px; background:var(--surface); text-align:center; cursor:pointer; transition:var(--ease); }
    .dc-slot:hover{ border-color:var(--accent); box-shadow:var(--sh-1); }
    .dc-slot.dim{ opacity:.55; cursor:default; }
    .dc-slot.dim:hover{ border-color:var(--line); box-shadow:none; }
    .dc-slot .dn{ font:700 21px 'Bricolage Grotesque',sans-serif; color:var(--ink); letter-spacing:-.02em; }
    .dc-slot .dt{ font-size:11px; color:var(--muted); margin:2px 0 7px; }
    .dc-ss{ display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:var(--pill); color:#fff; }
    .dc-field{ margin-bottom:13px; }
    .dc-field>label{ display:block; font-size:12px; font-weight:700; color:var(--ink-2); margin:0 0 5px; }
    .dc-input{ width:100%; border:1px solid var(--line); border-radius:var(--r-1); padding:10px 12px; font:inherit; font-size:14px; background:var(--surface); color:var(--ink); }
    .dc-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .dc-row{ display:block; }   /* 모바일 고정폭: 필드 세로 스택(오버플로우 방지) */
    .dc-btn{ font:inherit; font-size:14px; font-weight:700; padding:11px 18px; border-radius:var(--r-1); border:1px solid var(--line); background:var(--surface); color:var(--ink-2); cursor:pointer; }
    .dc-btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .dc-btn.primary:disabled{ opacity:.5; cursor:not-allowed; }
    .dc-btn.danger{ color:var(--danger); border-color:var(--line); }
    .dc-btn.ghost{ background:none; }
    .dc-consent{ display:flex; gap:9px; align-items:flex-start; font-size:12.5px; line-height:1.5; color:var(--ink-2); padding:7px 0; cursor:pointer; }
    .dc-consent input{ flex:none; margin-top:2px; width:16px; height:16px; accent-color:var(--accent); }
    .dc-consent>span{ flex:1; min-width:0; }
    .dc-swatches{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .dc-sw{ width:24px; height:24px; border-radius:6px; border:1px solid rgba(0,0,0,.15); cursor:pointer; padding:0; }
    .dc-scrim{ position:fixed; inset:0; background:rgba(20,28,22,.55); display:flex; align-items:flex-start; justify-content:center; padding:30px 16px; overflow:auto; z-index:200; }
    .dc-modal{ background:var(--surface); border-radius:var(--r-3); box-shadow:var(--sh-3); width:min(480px,100%); padding:22px; }
    .dc-tag{ display:inline-block; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:var(--pill); color:#fff; }
    .dc-note{ font-size:12.5px; color:var(--muted); line-height:1.55; }
    .dc-err{ color:var(--danger); font-size:13px; font-weight:600; min-height:18px; margin-top:8px; }
    .dc-ok{ color:var(--accent); font-size:13px; font-weight:600; }
    .dc-mono{ font-family:ui-monospace,Menlo,monospace; font-size:20px; font-weight:700; letter-spacing:.04em; color:var(--accent-ink); background:var(--accent-soft); border-radius:var(--r-1); padding:8px 14px; display:inline-block; }

    /* 달력형(월 그리드) */
    .dc-months{ display:grid; grid-template-columns:repeat(auto-fit,minmax(290px,1fr)); gap:22px; }
    .dc-mtitle{ font:700 15px 'Bricolage Grotesque',sans-serif; margin:0 0 10px; color:var(--ink); letter-spacing:-.01em; }
    .dc-dow{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; margin-bottom:5px; }
    .dc-dow span{ text-align:center; font-size:11px; font-weight:700; color:var(--muted); }
    .dc-dow span.sun{ color:var(--danger); }
    .dc-days{ display:grid; grid-template-columns:repeat(7,1fr); gap:5px; }
    .dc-days{ gap:4px; }
    .dc-day{ min-height:48px; border:1px solid transparent; border-radius:8px; padding:2px; position:relative; display:flex; flex-direction:column; align-items:center; justify-content:center; }
    .dc-day .dnum{ position:absolute; top:3px; left:5px; font-size:9px; color:var(--faint); }
    .dc-day.slot{ border-color:var(--line); background:var(--surface-2); }
    .dc-day.slot .dd{ font:700 13px 'Bricolage Grotesque',sans-serif; color:var(--ink); line-height:1; margin-top:6px; }
    .dc-day .sdot{ width:6px; height:6px; border-radius:50%; margin-top:5px; flex:none; }
    .dc-toggle{ font:700 9.5px 'Hanken Grotesk',sans-serif; border:none; background:none; cursor:pointer; padding:2px 3px; margin-top:3px; }
    .dc-day.slot.open{ cursor:pointer; }
    .dc-day.slot.open:hover{ border-color:var(--accent); box-shadow:var(--sh-1); }
    .dc-day.slot.dimmed{ opacity:.5; }
    .dc-day.today{ outline:2px solid var(--accent); outline-offset:-1px; }
    .dc-day.approved{ background:var(--st-ready); border-color:var(--st-ready); cursor:pointer; min-height:56px; }
    .dc-day.approved .dnum{ color:rgba(255,255,255,.7); }
    .dc-day.approved .dd{ color:#fff; }
    .dc-day.approved:hover{ box-shadow:var(--sh-2); filter:brightness(1.04); }
    .dc-appname{ font:700 10px 'Hanken Grotesk',sans-serif; color:#fff; margin-top:3px; max-width:100%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; padding:0 2px; }

    /* 관리자 */
    .dc-stats{ display:flex; gap:8px; flex-wrap:wrap; }
    .dc-stat{ background:var(--surface-2); border:1px solid var(--line); border-radius:var(--r-2); padding:9px 14px; text-align:center; min-width:70px; }
    button.dc-stat{ font:inherit; cursor:pointer; transition:var(--ease); }
    button.dc-stat:hover{ border-color:var(--accent); }
    .dc-stat.on{ border-color:var(--accent); background:var(--accent-soft); }
    .dc-stat b{ display:block; font:700 19px 'Bricolage Grotesque',sans-serif; color:var(--ink); }
    .dc-stat span{ font-size:11px; color:var(--muted); }
    .dc-sec{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-3); box-shadow:var(--sh-1); margin-bottom:14px; overflow:hidden; }
    .dc-sec>summary{ list-style:none; cursor:pointer; padding:14px 18px; font-weight:700; font-size:14px; color:var(--ink); display:flex; align-items:center; gap:8px; }
    .dc-sec>summary::-webkit-details-marker{ display:none; }
    .dc-sec>summary::before{ content:'▸'; color:var(--accent); font-size:12px; transition:var(--ease); }
    .dc-sec[open]>summary::before{ transform:rotate(90deg); }
    .dc-sec .dc-secbody{ padding:0 18px 18px; }
    .dc-slider{ display:flex; align-items:center; gap:12px; margin-bottom:10px; }
    .dc-slider label{ flex:0 0 130px; font-size:12.5px; font-weight:600; color:var(--ink-2); }
    .dc-slider input[type=range]{ flex:1; accent-color:var(--accent); }
    .dc-slider .val{ flex:0 0 52px; text-align:right; font-size:12px; color:var(--muted); font-variant-numeric:tabular-nums; }
    .dc-app{ border:1px solid var(--line); border-radius:var(--r-2); padding:14px; margin-bottom:10px; }
    .dc-app.todo{ border-color:var(--st-draft); background:var(--st-draft-bg); }
    .dc-applist{ display:grid; gap:10px; }

    /* 5일 단위 그룹 캘린더 */
    .dc-grp{ margin-bottom:16px; }
    .dc-grp:last-child{ margin-bottom:0; }
    .dc-grp-h{ font:700 13px 'Bricolage Grotesque',sans-serif; color:var(--ink); margin:0 0 8px; display:flex; align-items:baseline; gap:8px; }
    .dc-grp-d{ font:400 11.5px 'Hanken Grotesk',sans-serif; color:var(--muted); }
    .dc-grp-row{ display:grid; grid-template-columns:repeat(5,1fr); gap:6px; }
    .dc-slot2{ border:1px solid var(--line); border-radius:9px; padding:8px 3px; text-align:center; background:var(--surface-2); }
    .dc-slot2.open{ cursor:pointer; background:var(--st-ready); border-color:var(--st-ready); box-shadow:0 1px 3px rgba(47,143,107,.22); }
    .dc-slot2.open:hover{ background:#27815f; border-color:#27815f; box-shadow:0 4px 12px rgba(47,143,107,.32); transform:translateY(-1px); }
    .dc-slot2.open .d2-dn{ color:#fff; }
    .dc-slot2.open .d2-dt{ color:rgba(255,255,255,.82); }
    .dc-slot2.open .dc-ss2{ background:rgba(255,255,255,.24)!important; color:#fff; }
    .dc-slot2.dim{ opacity:.5; }
    .d2-dn{ font:700 14px 'Bricolage Grotesque',sans-serif; color:var(--ink); line-height:1; }
    .d2-dt{ font-size:10px; color:var(--muted); margin:3px 0 5px; }
    .dc-ss2{ display:inline-block; font-size:8.5px; font-weight:700; padding:1px 5px; border-radius:var(--pill); color:#fff; }

    /* 사진 업로드(승인 후) */
    .dc-photos{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px; }
    .dc-photo{ position:relative; aspect-ratio:1/1; border-radius:var(--r-1); overflow:hidden; border:1px solid var(--line); background:var(--surface-2); }
    .dc-photo img{ width:100%; height:100%; object-fit:cover; display:block; }
    .dc-photo .rm{ position:absolute; top:4px; right:4px; width:22px; height:22px; border:none; border-radius:50%; background:rgba(0,0,0,.55); color:#fff; cursor:pointer; font-size:13px; line-height:1; }
    .dc-photo-add{ display:flex; align-items:center; justify-content:center; aspect-ratio:1/1; border:1.5px dashed var(--line); border-radius:var(--r-1); color:var(--muted); cursor:pointer; font-size:12px; text-align:center; background:var(--surface-2); }
    .dc-logbox{ max-height:240px; overflow:auto; border:1px solid var(--line); border-radius:var(--r-1); background:var(--surface-2); }
    .dc-logrow{ display:flex; gap:8px; padding:6px 10px; border-bottom:1px solid var(--line-2); font-size:11.5px; color:var(--ink-2); }
    .dc-logrow:last-child{ border-bottom:none; }
    .dc-logrow .t{ color:var(--faint); flex:none; font-variant-numeric:tabular-nums; }
  </style>

  <!-- 콘솔 정리: Babel in-browser advisory 경고만 필터 -->
  <script>
    (function () {
      var w = console.warn;
      console.warn = function () {
        var m = arguments[0];
        if (typeof m === 'string' && m.indexOf('in-browser Babel transformer') >= 0) return;
        return w.apply(console, arguments);
      };
    })();
  </script>
  <!-- React + Babel + html-to-image (A4 출력) (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="__boot">Loading… · 불러오는 중…</div></div>

  <!-- 공용 도형 데이터 + 편집 스토어 (plain JS) -->
  <script src="/jamboree/shapes.js"></script>
  <script src="/jamboree/store.js"></script>
  <!-- 카드 프리미티브 (krjam-cardnews 와 공유) — dcard 가 쓰는 최소 의존만 로드 -->
  <script type="text/babel" data-presets="react" src="/jamboree/base.jsx"></script>
  <script type="text/babel" data-presets="react" src="/jamboree/shapes-comp.jsx"></script>
  <script type="text/babel" data-presets="react" src="/jamboree/lib.jsx"></script>
  <!-- D-가로 모듈 + D-count 앱 -->
  <script type="text/babel" data-presets="react" src="/krjam-dcount/dcard.jsx"></script>
  <script type="text/babel" data-presets="react" src="/krjam-dcount/app.jsx"></script>
</body>
