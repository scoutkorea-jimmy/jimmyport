<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>D-COUNT 카드 신청 — 제16회 한국잼버리</title>
  <link rel="icon" type="image/png" href="/jamboree/assets/logo.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,700&family=Hanken+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    /* ── 카드용 브랜드 폰트 (자체호스트, krjam-cardnews 와 동일) ── */
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-300.woff2') format('woff2'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('/jamboree/fonts/cafe24proslim-700.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-300.woff') format('woff'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-500.woff') format('woff'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('/jamboree/fonts/aggravo-700.woff') format('woff'); font-weight:700; font-display:swap; }

    /* ── 페이지 크롬: krjam-planning 그린 톤 토큰 ── */
    :root{
      --bg:#F3F4F1; --surface:#FFFFFF; --surface-2:#FAFBF9; --surface-3:#F5F7F3;
      --ink:#1B211D; --ink-2:#3E453F; --muted:#697066; --faint:#AAB0A8;
      --line:#E4E7E1; --line-2:#EDEFEA;
      --accent:#2F5D4A; --accent-ink:#234636; --accent-soft:#E8F0EB;
      --st-draft:#C8821C; --st-ready:#2F8F6B; --danger:#B5503C;
      --r-1:8px; --r-2:12px; --r-3:16px; --pill:999px;
      --sh-1:0 1px 2px rgba(22,32,26,.04), 0 1px 3px rgba(22,32,26,.05);
      --sh-2:0 6px 20px rgba(22,32,26,.10);
      --sh-3:0 22px 60px rgba(22,32,26,.24);
      --ease:.16s cubic-bezier(.4,0,.2,1);
    }
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{ background:var(--bg); color:var(--ink); font-family:'Hanken Grotesk','Apple SD Gothic Neo',sans-serif; }
    /* 카드 내부는 브랜드 폰트(Card 가 var(--cc-main) 사용), 제목용은 .hi(Aggravo) */
    .hi{ font-family:'Aggravo','Cafe24ProSlim',sans-serif; }
    img{ -webkit-user-drag:none; user-select:none; }
    .syncbar{ border-bottom:1px solid var(--line); padding:11px 0; display:flex; gap:12px; align-items:center; }
    .orgtag{ font-weight:700; color:var(--accent); font-size:13px; letter-spacing:-.01em; }
    .syncbar .st{ font-size:12px; color:var(--muted); }
    #__boot{ position:fixed; inset:0; display:flex; align-items:center; justify-content:center; color:var(--muted); font:14px/1.4 'Hanken Grotesk',sans-serif; }

    /* ── D-count 컴포넌트 ── */
    .dc-wrap{ max-width:1000px; margin:0 auto; padding:0 22px 80px; }
    .dc-nav{ display:flex; gap:6px; background:var(--surface-3); border:1px solid var(--line); border-radius:var(--pill); padding:4px; margin:18px 0 4px; width:max-content; }
    .dc-nav button{ font:inherit; font-size:13px; font-weight:600; padding:8px 18px; border:none; background:none; color:var(--muted); border-radius:var(--pill); cursor:pointer; }
    .dc-nav button.on{ background:var(--accent); color:#fff; box-shadow:var(--sh-1); }
    .dc-card{ background:var(--surface); border:1px solid var(--line); border-radius:var(--r-3); padding:20px; box-shadow:var(--sh-1); }
    .dc-cal{ display:grid; grid-template-columns:repeat(auto-fill,minmax(118px,1fr)); gap:10px; }
    .dc-slot{ border:1px solid var(--line); border-radius:var(--r-2); padding:12px 8px; background:var(--surface); text-align:center; cursor:pointer; transition:var(--ease); }
    .dc-slot:hover{ border-color:var(--accent); box-shadow:var(--sh-1); }
    .dc-slot.dim{ opacity:.55; cursor:default; }
    .dc-slot.dim:hover{ border-color:var(--line); box-shadow:none; }
    .dc-slot .dn{ font:700 21px 'Bricolage Grotesque',sans-serif; color:var(--ink); letter-spacing:-.02em; }
    .dc-slot .dt{ font-size:11px; color:var(--muted); margin:2px 0 7px; }
    .dc-ss{ display:inline-block; font-size:11px; font-weight:700; padding:2px 9px; border-radius:var(--pill); color:#fff; }
    .dc-field{ margin-bottom:13px; }
    .dc-field>label{ display:block; font-size:12px; font-weight:700; color:var(--ink-2); margin:0 0 5px; }
    .dc-input{ width:100%; border:1px solid var(--line); border-radius:var(--r-1); padding:10px 12px; font:inherit; font-size:14px; background:var(--surface); color:var(--ink); }
    .dc-input:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }
    .dc-row{ display:flex; gap:12px; flex-wrap:wrap; }
    .dc-row>*{ flex:1 1 160px; }
    .dc-btn{ font:inherit; font-size:14px; font-weight:700; padding:11px 18px; border-radius:var(--r-1); border:1px solid var(--line); background:var(--surface); color:var(--ink-2); cursor:pointer; }
    .dc-btn.primary{ background:var(--accent); border-color:var(--accent); color:#fff; }
    .dc-btn.primary:disabled{ opacity:.5; cursor:not-allowed; }
    .dc-btn.danger{ color:var(--danger); border-color:var(--line); }
    .dc-btn.ghost{ background:none; }
    .dc-consent{ display:flex; gap:9px; align-items:flex-start; font-size:12.5px; line-height:1.5; color:var(--ink-2); padding:7px 0; cursor:pointer; }
    .dc-consent input{ flex:none; margin-top:2px; width:16px; height:16px; accent-color:var(--accent); }
    .dc-swatches{ display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
    .dc-sw{ width:24px; height:24px; border-radius:6px; border:1px solid rgba(0,0,0,.15); cursor:pointer; padding:0; }
    .dc-scrim{ position:fixed; inset:0; background:rgba(20,28,22,.55); display:flex; align-items:flex-start; justify-content:center; padding:30px 16px; overflow:auto; z-index:200; }
    .dc-modal{ background:var(--surface); border-radius:var(--r-3); box-shadow:var(--sh-3); width:min(940px,100%); padding:24px; }
    .dc-tag{ display:inline-block; font-size:11.5px; font-weight:700; padding:3px 11px; border-radius:var(--pill); color:#fff; }
    .dc-note{ font-size:12.5px; color:var(--muted); line-height:1.55; }
    .dc-err{ color:var(--danger); font-size:13px; font-weight:600; min-height:18px; margin-top:8px; }
    .dc-ok{ color:var(--accent); font-size:13px; font-weight:600; }
    .dc-mono{ font-family:ui-monospace,Menlo,monospace; font-size:20px; font-weight:700; letter-spacing:.04em; color:var(--accent-ink); background:var(--accent-soft); border-radius:var(--r-1); padding:8px 14px; display:inline-block; }
  </style>

  <!-- 콘솔 정리: Babel in-browser advisory 경고만 필터 -->
  <script>
    (function () {
      var w = console.warn;
      console.warn = function () {
        var m = arguments[0];
        if (typeof m === 'string' && m.indexOf('in-browser Babel transformer') >= 0) return;
        return w.apply(console, arguments);
      };
    })();
  </script>
  <!-- React + Babel (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="__boot">불러오는 중…</div></div>

  <!-- 공용 도형 데이터 + 편집 스토어 (plain JS) -->
  <script src="/jamboree/shapes.js"></script>
  <script src="/jamboree/store.js"></script>
  <!-- 카드 프리미티브 (krjam-cardnews 와 공유) — dcard 가 쓰는 최소 의존만 로드 -->
  <script type="text/babel" data-presets="react" src="/jamboree/base.jsx"></script>
  <script type="text/babel" data-presets="react" src="/jamboree/shapes-comp.jsx"></script>
  <script type="text/babel" data-presets="react" src="/jamboree/lib.jsx"></script>
  <!-- D-가로 모듈 + D-count 앱 -->
  <script type="text/babel" data-presets="react" src="/krjam-dcount/dcard.jsx"></script>
  <script type="text/babel" data-presets="react" src="/krjam-dcount/app.jsx"></script>
</body>
</html>
