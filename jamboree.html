<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>한국잼버리 카드뉴스 제작기</title>
  <link rel="icon" type="image/png" href="jamboree/assets/logo.png" />

  <!-- 공유(OG / Twitter) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="제16회 한국잼버리" />
  <meta property="og:title" content="제16회 한국잼버리 카드뉴스 제작기" />
  <meta property="og:description" content="제16회 한국잼버리(2026.8.5–8.9, 강원 고성) 카드뉴스를 만들고 PNG로 내보내는 제작기" />
  <meta property="og:image" content="https://scoutingapp.net/jamboree/assets/og.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:url" content="https://scoutingapp.net/jamboree" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="제16회 한국잼버리 카드뉴스 제작기" />
  <meta name="twitter:description" content="제16회 한국잼버리 카드뉴스 제작기" />
  <meta name="twitter:image" content="https://scoutingapp.net/jamboree/assets/og.png" />

  <!-- Pretendard (CDN, dynamic subset) — chrome/body fallback -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard-dynamic-subset.css" />

  <style>
    /* 브랜드 폰트 (자체호스트) */
    @font-face { font-family:'Cafe24ProSlim'; src:url('jamboree/fonts/cafe24proslim-300.woff2') format('woff2'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('jamboree/fonts/cafe24proslim-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
    @font-face { font-family:'Cafe24ProSlim'; src:url('jamboree/fonts/cafe24proslim-700.woff2') format('woff2'); font-weight:700; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('jamboree/fonts/aggravo-300.woff') format('woff'); font-weight:300; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('jamboree/fonts/aggravo-500.woff') format('woff'); font-weight:500; font-display:swap; }
    @font-face { font-family:'Aggravo'; src:url('jamboree/fonts/aggravo-700.woff') format('woff'); font-weight:700; font-display:swap; }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body { font-family: var(--cc-main, 'Cafe24ProSlim'), 'Apple SD Gothic Neo', sans-serif; background: #F3F4F1; }
    #root { width: 100vw; height: 100vh; }
    /* 제목용 디스플레이 페이스 (Aggravo) */
    .hi { font-family: var(--cc-hi, 'Aggravo'), 'Cafe24ProSlim', sans-serif; }
    img { -webkit-user-drag: none; user-select: none; }
    #__boot { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; color: #9a93a3; font: 14px/1.4 'Pretendard', sans-serif; }

    /* Mobile: stack the 3-column editor (left templates → preview → right edit) */
    @media (max-width: 820px) {
      .cc-head { height: auto !important; flex-wrap: wrap; gap: 8px; padding: 9px 12px !important; }
      .cc-body { flex-direction: column !important; overflow-y: auto; -webkit-overflow-scrolling: touch; }
      .cc-aside-l, .cc-aside-r { width: auto !important; flex: 0 0 auto !important; border-left: none !important; border-right: none !important; }
      .cc-aside-l { order: 1; max-height: 30vh; border-bottom: 1px solid #e7e1d8 !important; }
      .cc-stage { order: 2; flex: 0 0 auto !important; min-height: 48vh; padding: 16px !important; }
      .cc-aside-r { order: 3; border-top: 1px solid #e7e1d8 !important; padding: 14px !important; }
    }
  </style>

  <!-- 콘솔 정리: Babel in-browser 변환기 advisory 경고만 필터(개발용 도구라 인브라우저 컴파일 사용) -->
  <script>
    (function () {
      var w = console.warn;
      console.warn = function () {
        var m = arguments[0];
        if (typeof m === 'string' && m.indexOf('in-browser Babel transformer') >= 0) return;
        return w.apply(console, arguments);
      };
    })();
  </script>
  <!-- React + Babel + html-to-image (CDN) -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html-to-image@1.11.13/dist/html-to-image.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>
</head>
<body>
  <div id="root"><div id="__boot">불러오는 중…</div></div>

  <!-- 공용 도형 데이터 + 편집 스토어 (plain JS) -->
  <script src="jamboree/shapes.js"></script>
  <script src="jamboree/store.js"></script>

  <!-- 카드 컴포넌트 (JSX, 의존 순서) -->
  <script type="text/babel" data-presets="react" src="jamboree/base.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/shapes-comp.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/lib.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/cover.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/templates.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/news.jsx"></script>
  <script type="text/babel" data-presets="react" src="jamboree/dday.jsx"></script>

  <!-- 제작기 셸 (마지막) -->
  <script type="text/babel" data-presets="react" src="jamboree/app.jsx"></script>

  <script src="version-watch.js"></script>
</body>
</html>
